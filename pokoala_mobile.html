<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#1a0a0a">
<title>PoKoala</title>
<link rel="manifest" href="./manifest.json">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Raleway:wght@700;800;900&display=swap" rel="stylesheet">
<script src="https://accounts.google.com/gsi/client" async></script>
<style>
:root{
  --red:#CC0000;--red2:#FF3333;--red-dark:#990000;
  --yellow:#FFDE00;--yellow2:#FFD700;
  --blue:#003A8C;--blue2:#1565C0;
  --white:#E8E0CC;--off-white:#E2D9C5;
  --ink:#1A1A2E;--ink2:#3D3D5C;--ink3:#7A7A9A;
  --border:rgba(26,26,46,0.12);
  --green:#0A7C4E;
  --radius:14px;--radius-sm:10px;--radius-xs:6px;
  --nav-h:62px;
  --header-h:58px;
  --safe-top:env(safe-area-inset-top,0px);
  --safe-bottom:env(safe-area-inset-bottom,0px);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden}
body{
  font-family:'Nunito',sans-serif;
  color:var(--ink);
  font-size:14px;
  background-color:#1a0a0a;
  background-image:
    radial-gradient(ellipse at 20% 20%,rgba(204,0,0,0.25) 0%,transparent 50%),
    radial-gradient(ellipse at 80% 80%,rgba(0,58,140,0.2) 0%,transparent 50%),
    radial-gradient(ellipse at 50% 50%,rgba(255,222,0,0.05) 0%,transparent 70%);
  background-attachment:fixed;
}
body::before{
  content:'';position:fixed;inset:0;
  background-image:url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M30 5L55 20v30L30 55 5 40V20z' fill='none' stroke='rgba(255,255,255,0.03)' stroke-width='1'/%3E%3C/svg%3E");
  background-size:60px 60px;pointer-events:none;z-index:0;
}

/* ── APP SHELL ── */
#app{display:flex;flex-direction:column;height:100vh;height:100dvh;position:relative;z-index:1}

/* ── HEADER ── */
#header{
  flex-shrink:0;
  height:calc(var(--header-h) + var(--safe-top));
  padding-top:var(--safe-top);
  display:flex;align-items:center;justify-content:space-between;
  padding-left:14px;padding-right:14px;
  background:rgba(10,0,20,0.75);
  backdrop-filter:blur(12px);
  border-bottom:1px solid rgba(255,255,255,0.07);
  position:relative;z-index:20;
}
.header-logo{
  display:flex;align-items:center;gap:8px;
}
.logo-koala{width:38px;height:38px;flex-shrink:0}
.logo-text{
  font-family:'Raleway',sans-serif;font-weight:900;font-size:24px;
  letter-spacing:-.02em;line-height:1;
}
.logo-po{color:#A81800;text-shadow:0 0 12px rgba(168,24,0,0.6)}
.logo-koala-text{color:var(--yellow2);text-shadow:0 0 12px rgba(255,215,0,0.4)}

/* Drive pill */
.drive-pill{
  display:flex;align-items:center;gap:7px;
  padding:7px 13px;border-radius:20px;
  background:rgba(255,255,255,0.07);
  border:1px solid rgba(255,255,255,0.12);
  cursor:pointer;user-select:none;
  transition:background .15s;
}
.drive-pill:active{background:rgba(255,255,255,0.14)}
.drive-pill svg{width:16px;height:14px;flex-shrink:0}
.drive-pill-label{font-size:11px;font-weight:700;color:rgba(255,255,255,0.7)}
.drive-dot{width:7px;height:7px;border-radius:50%;background:rgba(255,255,255,0.25);flex-shrink:0;transition:background .3s}
.drive-dot.ok{background:#4ade80;box-shadow:0 0 6px rgba(74,222,128,0.5)}
.drive-dot.busy{background:var(--yellow2);animation:blink 1s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}

/* ── CONTENT ── */
#content{flex:1;overflow:hidden;position:relative}
.tab-page{
  position:absolute;inset:0;
  overflow-y:auto;-webkit-overflow-scrolling:touch;
  padding:12px 12px calc(16px + var(--safe-bottom));
  display:none;
}
.tab-page.active{display:block}

/* ── BOTTOM NAV ── */
#nav{
  flex-shrink:0;
  height:calc(var(--nav-h) + var(--safe-bottom));
  padding-bottom:var(--safe-bottom);
  background:rgba(10,0,20,0.92);
  backdrop-filter:blur(16px);
  border-top:1px solid rgba(255,255,255,0.07);
  display:flex;align-items:flex-start;
  position:relative;z-index:20;
}
.nav-btn{
  flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:3px;padding:9px 0 0;
  font-size:9px;font-weight:800;letter-spacing:.04em;text-transform:uppercase;
  color:rgba(255,255,255,0.28);
  cursor:pointer;user-select:none;
  border:none;background:none;font-family:'Nunito',sans-serif;
  transition:color .15s;
}
.nav-btn:active{opacity:.7}
.nav-btn.active{color:var(--yellow2)}
.nav-icon{width:24px;height:24px;flex-shrink:0}
.nav-btn.active .nav-icon path,
.nav-btn.active .nav-icon rect,
.nav-btn.active .nav-icon circle,
.nav-btn.active .nav-icon polygon{stroke:var(--yellow2)}
.nav-btn.active .nav-icon-fill{fill:var(--yellow2)}

/* ── STAT CARDS (style PC) ── */
.stats-row{display:flex;gap:8px;margin-bottom:12px}
.stat-card{
  flex:1;
  background:linear-gradient(135deg,var(--white),var(--off-white));
  border:1px solid var(--border);
  border-radius:var(--radius);
  padding:10px 8px;text-align:center;
  box-shadow:0 4px 16px rgba(26,26,46,0.15);
  cursor:pointer;transition:filter .1s;
}
.stat-card:active{filter:brightness(.95)}
.stat-icon{height:52px;display:flex;align-items:center;justify-content:center;margin-bottom:4px;overflow:visible}
.stat-val{font-size:18px;font-weight:900;font-family:'Raleway',sans-serif;color:var(--ink);line-height:1}
.stat-lbl{font-size:9px;font-weight:800;color:var(--ink3);text-transform:uppercase;letter-spacing:.06em;margin-top:2px}

/* ── SECTION TITLE ── */
.section-title{
  display:flex;align-items:center;gap:8px;
  padding:10px 14px;
  font-size:11px;font-weight:800;
  color:rgba(255,255,255,0.45);
  text-transform:uppercase;letter-spacing:.08em;
}

/* ── SEARCH BAR ── */
.search-wrap{
  display:flex;gap:8px;margin-bottom:10px;
  position:sticky;top:0;z-index:5;
  padding:2px 0 4px;
}
.search-input{
  flex:1;padding:10px 14px 10px 38px;border-radius:var(--radius-sm);
  background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.1);
  color:rgba(255,255,255,0.9);font-family:'Nunito',sans-serif;font-size:14px;
  outline:none;-webkit-appearance:none;
  background-image:url("data:image/svg+xml,%3Csvg width='16' height='16' viewBox='0 0 24 24' fill='none' stroke='rgba(255,255,255,0.3)' stroke-width='2.5' xmlns='http://www.w3.org/2000/svg'%3E%3Ccircle cx='11' cy='11' r='8'/%3E%3Cpath d='M21 21l-4.35-4.35'/%3E%3C/svg%3E");
  background-repeat:no-repeat;background-position:12px center;background-size:16px;
}
.search-input:focus{border-color:rgba(255,215,0,0.35);background-color:rgba(255,255,255,0.1)}
.search-input::placeholder{color:rgba(255,255,255,0.25)}

/* ── FILTER PILLS ── */
.filter-pills{display:flex;gap:6px;margin-bottom:10px;overflow-x:auto;-webkit-overflow-scrolling:touch}
.filter-pills::-webkit-scrollbar{display:none}
.filter-pill{
  flex-shrink:0;padding:5px 13px;border-radius:20px;
  background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);
  font-size:11px;font-weight:800;color:rgba(255,255,255,0.4);cursor:pointer;
  letter-spacing:.03em;
}
.filter-pill.active{
  background:rgba(168,24,0,0.25);border-color:rgba(204,0,0,0.5);
  color:var(--yellow2);
}

/* ── CARD BLOCK ── */
.card-block{
  background:rgba(255,255,255,0.04);
  border:1px solid rgba(255,255,255,0.07);
  border-radius:var(--radius);overflow:hidden;margin-bottom:10px;
}

/* ── COLLECTION ITEMS ── */
.coll-item{
  display:flex;align-items:center;gap:10px;
  padding:9px 12px;
  border-bottom:1px solid rgba(255,255,255,0.04);
  cursor:pointer;
}
.coll-item:last-child{border-bottom:none}
.coll-item:active{background:rgba(255,255,255,0.04)}
.coll-thumb{width:40px;height:56px;object-fit:contain;border-radius:3px;flex-shrink:0;background:rgba(255,255,255,0.03)}
.coll-thumb-ph{
  width:40px;height:56px;border-radius:3px;flex-shrink:0;
  background:rgba(255,255,255,0.05);
  display:flex;align-items:center;justify-content:center;
}
.coll-info{flex:1;min-width:0}
.coll-name{font-weight:700;font-size:13px;color:rgba(255,255,255,0.9);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.coll-sub{font-size:10px;color:rgba(255,255,255,0.38);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.coll-right{text-align:right;flex-shrink:0}
.coll-qty{
  font-size:12px;font-weight:800;color:var(--yellow2);
  background:rgba(255,215,0,0.1);border-radius:6px;padding:2px 7px;
  display:inline-block;
}
.coll-price{font-size:10px;color:rgba(255,255,255,0.35);margin-top:3px}

/* ── RARITY BADGE ── */
.badge{display:inline-block;padding:1px 6px;border-radius:4px;font-size:9px;font-weight:800;letter-spacing:.02em}
.b-common{background:rgba(255,255,255,0.07);color:rgba(255,255,255,0.4)}
.b-uncommon{background:rgba(100,200,100,0.12);color:#6dc46d}
.b-rare{background:rgba(30,100,255,0.12);color:#7aadff}
.b-holo{background:rgba(200,150,0,0.18);color:var(--yellow2)}
.b-secret{background:rgba(180,0,200,0.18);color:#e060ff}

/* ── SERIES BROWSER ── */
.serie-block{
  background:rgba(20,10,40,0.85);border:1px solid rgba(255,255,255,0.1);
  border-radius:var(--radius-sm);margin-bottom:7px;overflow:hidden;
}
.serie-header{
  display:flex;align-items:center;gap:10px;padding:12px 14px;
  cursor:pointer;user-select:none;
}
.serie-header:active{background:rgba(255,255,255,0.04)}
.serie-name{flex:1;font-weight:700;font-size:14px;color:rgba(255,255,255,0.85)}
.serie-arrow{color:rgba(255,255,255,0.25);font-size:11px;transition:transform .2s;flex-shrink:0}
.serie-arrow.open{transform:rotate(180deg)}
.serie-sets{display:none;border-top:1px solid rgba(255,255,255,0.05)}
.serie-sets.open{display:block}
.set-item{
  display:flex;align-items:center;gap:10px;
  padding:9px 14px 9px 22px;
  border-bottom:1px solid rgba(255,255,255,0.03);cursor:pointer;
}
.set-item:last-child{border-bottom:none}
.set-item:active{background:rgba(255,255,255,0.05)}
.set-item-name{flex:1;font-size:13px;font-weight:600;color:rgba(255,255,255,0.75)}
.set-item-count{font-size:10px;color:rgba(255,255,255,0.25);font-weight:600}

/* ── CARD GRID ── */
.card-grid{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:5px;padding:8px;
}
.grid-card{
  position:relative;border-radius:8px;overflow:hidden;
  cursor:pointer;
  aspect-ratio:63/88;
  background:rgba(255,255,255,0.04);
}
.grid-card img{width:100%;height:100%;object-fit:cover;display:block}
.grid-card.not-owned{filter:grayscale(80%) brightness(0.5)}
.grid-card-num{
  position:absolute;bottom:3px;left:0;right:0;text-align:center;
  font-size:9px;font-weight:700;color:rgba(255,255,255,0.7);
  text-shadow:0 1px 3px rgba(0,0,0,0.8);
}
.grid-card-qty{
  position:absolute;top:3px;right:3px;
  background:rgba(255,215,0,0.9);color:#000;
  font-size:9px;font-weight:800;border-radius:4px;padding:1px 4px;
}
.grid-add-btn{
  position:absolute;top:4px;left:4px;
  background:rgba(255,215,0,0.95);color:#000;
  border:none;border-radius:6px;padding:4px 8px;
  font-size:14px;font-weight:800;cursor:pointer;
  opacity:1;line-height:1.2;
}

/* ── PROGRESS BAR ── */
.prog-bar{height:4px;border-radius:2px;background:rgba(255,255,255,0.08);overflow:hidden}
.prog-fill{height:100%;border-radius:2px;background:linear-gradient(90deg,var(--yellow2),#FFA500);transition:width .3s}

/* ── GRID OVERLAY ── */
#grid-overlay{
  position:fixed;
  top:0;left:0;right:0;
  bottom:calc(var(--nav-h) + var(--safe-bottom));
  z-index:100;
  background:#100820;
  transform:translateY(calc(-100% - var(--nav-h) - var(--safe-bottom)));
  transition:transform .28s cubic-bezier(.4,0,.2,1);
  display:flex;flex-direction:column;
}
#grid-overlay.open{transform:translateY(0)}
#grid-overlay.open{transform:translateY(0)}
.grid-ov-header{
  flex-shrink:0;
  display:flex;align-items:center;gap:10px;
  padding:10px 14px;
  padding-top:calc(10px + var(--safe-top));
  background:rgba(10,0,20,0.85);
  border-bottom:1px solid rgba(255,255,255,0.07);
}
.grid-ov-back{
  width:34px;height:34px;border-radius:50%;
  background:rgba(255,255,255,0.07);border:none;
  display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;
}
.grid-ov-title{flex:1;font-family:'Raleway',sans-serif;font-weight:800;font-size:15px;color:#fff;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.grid-ov-pct{font-size:13px;font-weight:800;color:var(--yellow2);flex-shrink:0}
.grid-stats{flex-shrink:0;padding:7px 12px;background:rgba(0,0,0,0.25);border-bottom:1px solid rgba(255,255,255,0.05)}
.grid-ov-body{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch}

/* ── MODAL (bottom sheet) ── */
.modal-bg{
  position:fixed;inset:0;z-index:200;
  background:rgba(0,0,0,0.8);
  display:flex;align-items:flex-end;
  opacity:0;pointer-events:none;transition:opacity .2s;
}
.modal-bg.open{opacity:1;pointer-events:auto}
.modal-sheet{
  width:100%;max-height:90vh;
  background:linear-gradient(180deg,#1E1040,#150C30);
  border-radius:20px 20px 0 0;
  border-top:1px solid rgba(255,255,255,0.1);
  overflow-y:auto;-webkit-overflow-scrolling:touch;
  transform:translateY(100%);transition:transform .25s cubic-bezier(.4,0,.2,1);
  padding-bottom:calc(20px + var(--safe-bottom));
}
.modal-bg.open .modal-sheet{transform:translateY(0)}
.modal-handle{
  width:38px;height:4px;border-radius:2px;
  background:rgba(255,255,255,0.18);
  margin:12px auto 0;
}
.modal-header{
  display:flex;align-items:center;justify-content:space-between;
  padding:12px 16px 4px;
}
.modal-title{font-family:'Raleway',sans-serif;font-weight:800;font-size:17px;color:#fff}
.modal-close{
  width:30px;height:30px;border-radius:50%;
  background:rgba(255,255,255,0.08);border:none;color:rgba(255,255,255,0.6);
  font-size:16px;display:flex;align-items:center;justify-content:center;cursor:pointer;
}
.modal-img-wrap{display:flex;justify-content:center;padding:12px 16px}
.modal-img-wrap img{max-width:190px;border-radius:10px;box-shadow:0 8px 30px rgba(0,0,0,0.6)}
.modal-section{padding:10px 16px;border-top:1px solid rgba(255,255,255,0.06)}
.modal-section label{display:block;font-size:10px;font-weight:800;color:rgba(255,255,255,0.35);text-transform:uppercase;letter-spacing:.07em;margin-bottom:7px}
.modal-section .val{font-size:15px;font-weight:700;color:rgba(255,255,255,0.85)}

/* ── QTY CONTROL ── */
.qty-ctrl{
  display:inline-flex;align-items:center;
  background:rgba(255,255,255,0.07);border-radius:10px;overflow:hidden;
}
.qty-ctrl button{
  width:44px;height:44px;background:none;border:none;color:#fff;
  font-size:22px;font-weight:700;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
}
.qty-ctrl button:active{background:rgba(255,255,255,0.12)}
.qty-ctrl .qty-val{min-width:40px;text-align:center;font-size:19px;font-weight:900;color:#fff}

/* ── SELECT ── */
.mob-select{
  padding:8px 10px;border-radius:var(--radius-xs);
  background:#1a0a2e;border:1px solid rgba(255,255,255,0.15);
  color:#fff;font-family:'Nunito',sans-serif;font-size:12px;font-weight:400;
  -webkit-appearance:auto;outline:none;width:100%;
}

/* ── BUTTONS ── */
.btn{
  display:inline-flex;align-items:center;justify-content:center;gap:6px;
  padding:12px 16px;border-radius:var(--radius-sm);border:none;
  font-family:'Nunito',sans-serif;font-size:14px;font-weight:700;
  cursor:pointer;transition:filter .1s;
}
.btn:active{filter:brightness(.82)}
.btn-primary{background:linear-gradient(135deg,var(--red),var(--red2));color:#fff}
.btn-secondary{background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.1);color:rgba(255,255,255,0.8)}
.btn-danger{background:rgba(200,0,0,0.18);border:1px solid rgba(200,0,0,0.28);color:#f87171}
.btn-drive{background:rgba(0,58,140,0.25);border:1px solid rgba(0,100,255,0.28);color:#7aadff}
.btn-full{width:100%}
.btn-row{display:flex;gap:8px;padding:10px 16px 4px}

/* ── SEARCH RESULTS ── */
.search-result{
  display:flex;align-items:center;gap:10px;
  padding:9px 12px;
  border-bottom:1px solid rgba(255,255,255,0.04);cursor:pointer;
}
.search-result:active{background:rgba(255,255,255,0.04)}
.search-result-img{width:34px;height:48px;object-fit:contain;border-radius:3px;flex-shrink:0;background:rgba(255,255,255,0.03)}
.search-result-info{flex:1;min-width:0}
.search-result-name{font-weight:700;font-size:13px;color:rgba(255,255,255,0.9);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.search-result-sub{font-size:10px;color:rgba(255,255,255,0.38);margin-top:1px}
.add-btn{
  width:34px;height:34px;border-radius:50%;flex-shrink:0;
  background:rgba(168,24,0,0.25);border:1px solid rgba(204,0,0,0.4);
  display:flex;align-items:center;justify-content:center;cursor:pointer;
}
.add-btn:active{background:rgba(204,0,0,0.4)}
.add-btn svg{width:16px;height:16px}

/* ── DRIVE MODAL ── */
.drive-options{display:flex;gap:8px;padding:0 16px 8px}
.drive-opt{
  flex:1;padding:14px 8px;text-align:center;
  background:rgba(255,255,255,0.04);
  border:1px solid rgba(255,255,255,0.09);
  border-radius:var(--radius-sm);cursor:pointer;
}
.drive-opt:active{background:rgba(255,255,255,0.09)}
.drive-opt .d-icon{margin-bottom:5px}
.drive-opt .d-label{font-size:12px;font-weight:700;color:rgba(255,255,255,0.65)}

/* ── TOAST ── */
#toast{
  position:fixed;
  bottom:calc(var(--nav-h) + var(--safe-bottom) + 10px);
  left:50%;transform:translateX(-50%);
  background:rgba(20,10,40,0.96);
  border:1px solid rgba(255,255,255,0.12);
  color:#fff;font-weight:700;font-size:12px;
  padding:9px 18px;border-radius:20px;
  white-space:nowrap;z-index:9999;
  opacity:0;pointer-events:none;transition:opacity .2s;
  max-width:calc(100vw - 28px);text-align:center;
}
#toast.show{opacity:1}

/* ── LOADER ── */
.loader{
  display:flex;align-items:center;justify-content:center;
  padding:32px;color:rgba(255,255,255,0.3);font-size:13px;font-weight:600;gap:10px;
}
.loader::before{
  content:'';width:18px;height:18px;border-radius:50%;flex-shrink:0;
  border:2px solid rgba(255,255,255,0.08);border-top-color:var(--yellow2);
  animation:spin .7s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── EMPTY ── */
.empty-state{
  text-align:center;padding:44px 20px;
  color:rgba(255,255,255,0.28);font-size:13px;font-weight:600;
}
.empty-state .big{font-size:44px;margin-bottom:10px;display:block}

/* ── HOME GRID ── */
.home-grid{
  display:grid;grid-template-columns:1fr 1fr;gap:12px;
  padding:16px 4px;
}
.home-tile{
  background:linear-gradient(135deg,var(--white),var(--off-white));
  border:1px solid var(--border);
  border-radius:var(--radius);
  padding:16px 10px 12px;
  text-align:center;
  box-shadow:0 4px 20px rgba(26,26,46,0.18);
  cursor:pointer;transition:filter .1s,transform .1s;
  display:flex;flex-direction:column;align-items:center;gap:6px;
}
.home-tile:active{filter:brightness(.92);transform:scale(.97)}
.home-tile-icon{height:60px;display:flex;align-items:center;justify-content:center;overflow:visible}
.home-tile-val{font-size:22px;font-weight:900;font-family:'Raleway',sans-serif;color:var(--ink);line-height:1}
.home-tile-lbl{font-size:10px;font-weight:800;color:var(--ink3);text-transform:uppercase;letter-spacing:.07em}

/* ── COLLECTION OVERLAY (pleine page) ── */
#coll-overlay{
  position:fixed;
  top:0;left:0;right:0;
  bottom:calc(var(--nav-h) + var(--safe-bottom));
  z-index:100;
  background:#100820;
  transform:translateY(calc(-100% - var(--nav-h) - var(--safe-bottom)));
  transition:transform .28s cubic-bezier(.4,0,.2,1);
  display:flex;flex-direction:column;
}
#coll-overlay.open{transform:translateY(0)}
.coll-ov-header{
  flex-shrink:0;
  display:flex;align-items:center;gap:10px;
  padding:10px 14px;
  padding-top:calc(10px + var(--safe-top));
  background:rgba(10,0,20,0.85);
  border-bottom:1px solid rgba(255,255,255,0.07);
}
.coll-ov-back{
  width:34px;height:34px;border-radius:50%;
  background:rgba(255,255,255,0.07);border:none;
  display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;
}
.coll-ov-title{flex:1;font-family:'Raleway',sans-serif;font-weight:800;font-size:16px;color:#fff}
.coll-ov-count{font-size:12px;font-weight:700;color:rgba(255,255,255,0.4);flex-shrink:0}
.coll-ov-search{
  flex-shrink:0;padding:8px 12px;
  background:rgba(0,0,0,0.2);border-bottom:1px solid rgba(255,255,255,0.05);
}
.coll-ov-body{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch}

/* ── SCROLLBARS ── */
::-webkit-scrollbar{width:3px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.1);border-radius:2px}
</style>
</head>
<body>

        <path d="M4 19.5A2.5 2.5 0 016.5 17H20" stroke="rgba(255,255,255,0.28)" stroke-width="1.8" stroke-linecap="round"/>
        <path d="M6.5 2H20v20H6.5A2.5 2.5 0 014 19.5v-15A2.5 2.5 0 016.5 2z" stroke="rgba(255,255,255,0.28)" stroke-width="1.8"/>

        <line x1="8" y1="11" x2="14" y2="11" stroke="rgba(255,255,255,0.28)" stroke-width="1.5" stroke-linecap="round"/>
      </svg>
      Parcourir
    </button>
    <button class="nav-btn" id="nav-search" onclick="switchTab('search')">
      <svg class="nav-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <circle cx="11" cy="11" r="8" stroke="rgba(255,255,255,0.28)" stroke-width="1.8"/>

</div><!-- /app -->

<!-- GRID OVERLAY -->
<div id="grid-overlay">
  <div class="grid-ov-header">
    <button class="grid-ov-back" onclick="closeGrid()">

  <div class="grid-ov-body">

  </div>
</div>

<!-- CARD MODAL -->
<div class="modal-bg" id="card-modal" onclick="if(event.target===this)closeModal('card-modal')">

    <div class="modal-handle"></div>
    <div id="card-modal-content"></div>
  </div>
</div>

function switchTab(tab){
  document.querySelectorAll('.tab-page').forEach(p=>p.classList.remove('active'));

  // Fermer les overlays ouverts
  document.getElementById('coll-overlay').classList.remove('open');
  document.getElementById('grid-overlay').classList.remove('open');
  document.body.style.overflow='';

  if(tab==='browse'&&!_seriesData.length) loadSeries();

// ── BASE LOCALE MOBILE ──
const MOBILE_DB_KEY = 'pk_db_light';
const MOBILE_DB_DATE_KEY = 'pk_db_light_date';
let _mobileDB = null; // {cards, sets, series}

async function loadMobileDB(){
  // 1. Essayer depuis localStorage
  try{
    const cached = localStorage.getItem(MOBILE_DB_KEY);
    if(cached){
      _mobileDB = JSON.parse(cached);
      console.log(`Base mobile : ${_mobileDB.cards?.length||0} cartes (cache local)`);
      return true;
    }
  }catch(e){}

  // 2. Essayer depuis le serveur local
  try{
    const r = await fetch(`${LOCAL}/api/mobile-db`, {signal: AbortSignal.timeout(500)});
    if(r.ok){
      _mobileDB = await r.json();
      if(_mobileDB.cards?.length > 0){
        localStorage.setItem(MOBILE_DB_KEY, JSON.stringify(_mobileDB));
        localStorage.setItem(MOBILE_DB_DATE_KEY, new Date().toISOString());
        console.log(`Base mobile : ${_mobileDB.cards.length} cartes (serveur local)`);
        return true;
      }
    }
  }catch(e){}

  // 3. Essayer depuis Drive
  if(_driveToken){
    try{
      const fileId = await driveFindFileByName('pokoala_db_light.json');
      if(fileId){
        const r = await fetch(`https://www.googleapis.com/drive/v3/files/${fileId}?alt=media`,{
          headers:{'Authorization':'Bearer '+_driveToken}
        });
        _mobileDB = await r.json();
        if(_mobileDB.cards?.length > 0){
          localStorage.setItem(MOBILE_DB_KEY, JSON.stringify(_mobileDB));
          localStorage.setItem(MOBILE_DB_DATE_KEY, new Date().toISOString());
          console.log(`Base mobile : ${_mobileDB.cards.length} cartes (Drive)`);
          return true;
        }
      }
    }catch(e){}
  }

  return false;
}

async function driveFindFileByName(name){
  if(!_driveToken) return null;
  const r = await fetch(
    `https://www.googleapis.com/drive/v3/files?q=name='${name}'+and+trashed=false&fields=files(id,name)`,
    {headers:{'Authorization':'Bearer '+_driveToken}}
  );
  const d = await r.json();
  return d.files?.[0]?.id || null;
}

async function syncMobileDB(){
  // Upload pokoala_db_light.json sur Drive depuis le serveur local
  if(!_driveToken){ toast('Connecte-toi à Drive d\'abord'); return; }
  try{
    toast('⏳ Génération de la base mobile…');
    const r = await fetch(`${LOCAL}/api/generate-mobile-db`, {signal: AbortSignal.timeout(10000)});
    if(!r.ok) throw new Error('Serveur non disponible');
    const info = await r.json();
    if(info.status !== 'ok') throw new Error(info.message||'Erreur génération');

    // Récupérer le fichier généré
    const r2 = await fetch(`${LOCAL}/api/mobile-db`);
    const data = await r2.text();

    // Uploader sur Drive
    const existingId = await driveFindFileByName('pokoala_db_light.json');
    let r3;
    if(existingId){
      r3 = await fetch(`https://www.googleapis.com/upload/drive/v3/files/${existingId}?uploadType=media`,{
        method:'PATCH',
        headers:{'Authorization':'Bearer '+_driveToken,'Content-Type':'application/json'},
        body: data
      });
    } else {
      const meta = JSON.stringify({name:'pokoala_db_light.json',mimeType:'application/json'});
      const form = new FormData();
      form.append('metadata', new Blob([meta],{type:'application/json'}));
      form.append('file', new Blob([data],{type:'application/json'}));
      r3 = await fetch('https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart',{
        method:'POST',
        headers:{'Authorization':'Bearer '+_driveToken},
        body: form
      });
    }
    await r3.json();

    // Mettre à jour le cache local
    _mobileDB = JSON.parse(data);
    localStorage.setItem(MOBILE_DB_KEY, data);
    localStorage.setItem(MOBILE_DB_DATE_KEY, new Date().toISOString());
    toast(`✅ Base mobile synchronisée (${info.cards} cartes)`);
  }catch(e){
    toast('Erreur sync : '+e.message);
  }
}

function escId(id){ return(id||'').replace(/\\/g,'\\\\').replace(/'/g,"\\'"); }

let _collOverlayFilter='all';

function openCollOverlay(filter){
  _collOverlayFilter=filter;
  const titles={all:'Ma Collection',doubles:'Doubles',value:'Valeur',forsale:'En vente'};
  document.getElementById('coll-ov-title').textContent=titles[filter]||'Ma Collection';
  document.getElementById('coll-search').value='';
  load(); // recharger depuis localStorage pour avoir les dernières données
  renderCollOverlay();
  document.getElementById('coll-overlay').classList.add('open');
  document.body.style.overflow='hidden';
}

function closeCollOverlay(){
  document.getElementById('coll-overlay').classList.remove('open');
  document.body.style.overflow='';
  renderHome(); // refresh counts
}

function renderCollOverlay(){
  const q=(document.getElementById('coll-search')?.value||'').toLowerCase().trim();
  let items=[...col];
  if(_collOverlayFilter==='doubles') items=items.filter(c=>c.qty>1);
  if(_collOverlayFilter==='forsale') items=items.filter(c=>c.for_sale);
  if(_collOverlayFilter==='value') items=items.sort((a,b)=>(b.price||0)*condMul(b.cond)-(a.price||0)*condMul(a.cond));
  if(q) items=items.filter(c=>(c.name||'').toLowerCase().includes(q)||(c.set||'').toLowerCase().includes(q));

  document.getElementById('coll-ov-count').textContent=items.length+' carte'+(items.length>1?'s':'');

  const list=document.getElementById('coll-list');
  if(!items.length){
    list.innerHTML=`<div class="empty-state"><span class="big">🃏</span>${col.length===0?'Ta collection est vide':'Aucune carte trouvée'}</div>`;
    return;
  }
  list.innerHTML=items.map(c=>{
    const img=cardImg(c);
    const mul=condMul(c.cond);
    const price=c.priceManual!=null?c.priceManual:(c.price?+(c.price*mul).toFixed(2):null);
    const sid=escId(c.id);
    return `<div class="coll-item" onclick="openCardModal('${sid}')">
      ${img?`<img class="coll-thumb" src="${img}" loading="lazy" onerror="this.style.display='none'">`:`<div class="coll-thumb-ph"></div>`}
      <div class="coll-info">
        <div class="coll-name">${c.name}</div>
        <div class="coll-sub">${c.set||''}${c.num?' · N°'+c.num:''}</div>
        ${c.rarity?`<div style="margin-top:3px">${rareBadge(c.rarity)}</div>`:''}
      </div>
      <div class="coll-right">
        <span class="coll-qty">${c.qty}×</span>
        ${price?`<div class="coll-price">${price.toFixed(2)} €</div>`:''}
      </div>
    </div>`;
  }).join('');
}

function cardImg(c){
  let url = c.imgLarge || c.img || '';
  if(!url && c.id){
    const p=c.id.split('-');
    if(p.length>=2){
      const sid=p.slice(0,-1).join('-'), num=p[p.length-1];
      return `https://assets.tcgdex.net/fr/${sid}/${num}/high.webp`;
    }
  }
  // Corriger les URLs TCGdex sans .webp
  if(url.includes('assets.tcgdex.net') && !url.endsWith('.webp')){
    url = url.replace('/high','/high.webp').replace('/low','/high.webp');
    if(!url.endsWith('.webp')) url += '.webp';
  }
  return url;
}



function rareBadge(r){
  if(!r) return'';
  const l=r.toLowerCase();
  if(l.includes('secret')||l.includes('hyper')||l.includes('rainbow')) return`<span class="badge b-secret">${r}</span>`;
  if(l.includes('illustration')) return`<span class="badge b-holo">${r}</span>`;
  if(l.includes('holo')||l.includes('ultra')||l.includes('full art')||l.includes('vmax')||l.includes(' ex')||l.includes(' v')) return`<span class="badge b-holo">${r}</span>`;
  if(l.includes('rare')) return`<span class="badge b-rare">${r}</span>`;
  if(l.includes('uncommon')) return`<span class="badge b-uncommon">${r}</span>`;
  return`<span class="badge b-common">${r}</span>`;
}

function updQty(id,d){
  const c=col.find(x=>x.id===id); if(!c) return;
  c.qty=Math.max(0,(c.qty||1)+d);
  if(c.qty===0){ col.splice(col.indexOf(c),1); closeModal('card-modal'); save(); if(document.getElementById('grid-overlay').classList.contains('open')) renderGrid(); return; }
  const el=document.getElementById('m-qty'); if(el) el.textContent=c.qty;
  save();
  if(document.getElementById('grid-overlay').classList.contains('open')) renderGrid();
}
function updCond(id,v){ const c=col.find(x=>x.id===id); if(c){ c.cond=v; save(); renderCollOverlay(); } }
function updSale(id,d){
  const c=col.find(x=>x.id===id); if(!c) return;
  c.qty_for_sale=Math.max(0,Math.min((c.qty_for_sale||0)+d,c.qty));
  c.for_sale=c.qty_for_sale>0;
  const el=document.getElementById('m-sale'); if(el) el.textContent=c.qty_for_sale;
  save(); renderCollOverlay();
}
function removeCard(id){
  col=col.filter(x=>x.id!==id);
  closeModal('card-modal'); save(); renderCollOverlay(); toast('Carte retirée');
}
function openCM(name,num){
  window.open('https://www.cardmarket.com/fr/Pokemon/Products/Search?searchString='+encodeURIComponent(name+' '+num),'_blank');
}

// ── ADD CARD ──
function addCard(cardData){
  const ex=col.find(c=>c.id===cardData.id);
  if(ex){ ex.qty=(ex.qty||1)+1; toast(`+1 · ${ex.name} (${ex.qty}×)`); }
  else{
    // Utiliser les images fournies par l'API en priorité
    let img = cardData.images?.small || '';
    let imgL = cardData.images?.large || '';
    // Ajouter .webp si URL TCGdex sans extension
    if(img.includes('assets.tcgdex.net') && !img.includes('.webp')) img += '.webp';
    if(imgL.includes('assets.tcgdex.net') && !imgL.includes('.webp')) imgL += '.webp';
    col.push({
      id:cardData.id, name:cardData.name, nameEn:cardData.name,
      set:cardData.set?.name||cardData.set||'',
      setId:cardData.set?.id||'',
      num:cardData.number||'',
      rarity:cardData.rarity||'',
      img, imgLarge:imgL,
      price:null, priceManual:null, cond:'NM',
      qty:1, qty_for_sale:0, for_sale:false
    });
    toast(`✅ ${cardData.name} ajoutée !`);
  }
  save(); renderCollOverlay();
}

async function doSearch(){
  const q=document.getElementById('search-q').value.trim().toLowerCase();
  const res=document.getElementById('search-results');
  if(q.length<2){ res.innerHTML=`<div class="empty-state"><span class="big">🔍</span>Tape un nom de carte pour commencer</div>`; return; }

  // 1. Recherche dans la base mobile locale
  if(_mobileDB?.cards?.length){
    const results = _mobileDB.cards.filter(c =>
      (c.name||'').toLowerCase().includes(q)
    ).slice(0,40);
    if(results.length){
      renderSearchResults(results.map(c=>({
        id: c.id,
        name: c.name,
        number: c.number,
        rarity: c.rarity,
        set: {id: c.setId, name: c.setName},
        images: {small: `https://assets.tcgdex.net/fr/${c.setId}/${c.number}/low`}
      })));
      return;
    }
  }

  // 2. Fallback API pokemontcg.io
  res.innerHTML=`<div class="loader">Recherche en cours…</div>`;
  try{
    const r=await fetch(`${POKEMONTCG}/cards?q=name:"${encodeURIComponent(q)}"&pageSize=30&select=id,name,number,rarity,set,images`);
    const d=await r.json();
    const cards=d.data||[];
    if(!cards.length){ res.innerHTML=`<div class="empty-state"><span class="big">🤷</span>Aucune carte trouvée pour "${q}"</div>`; return; }
    renderSearchResults(cards);
  }catch(e){ res.innerHTML=`<div class="empty-state"><span class="big">⚠️</span>Erreur de connexion</div>`; }
}

function renderSearchResults(cards){
  const res=document.getElementById('search-results');
  res.innerHTML=cards.map(c=>{
    const owned=col.find(x=>x.id===c.id);
    const img=c.images?.small||`https://assets.tcgdex.net/fr/${c.set?.id||''}/${c.number||''}/low`;
    const cj=JSON.stringify(c).replace(/\\/g,'\\\\').replace(/'/g,"\\'");
    return`<div class="search-result">
      ${img?`<img class="search-result-img" src="${img}" loading="lazy">`:'<div class="search-result-img"></div>'}
      <div class="search-result-info">
        <div class="search-result-name">${c.name}</div>
        <div class="search-result-sub">${c.set?.name||''} · N°${c.number||'—'} · ${c.rarity||'—'}</div>
        ${owned?`<div style="font-size:10px;color:var(--yellow2);margin-top:2px;font-weight:700">✓ Dans la collection (${owned.qty}×)</div>`:''}
      </div>
      <div class="add-btn" onclick="addCardFromJson('${cj}')">

      </div>
    </div>`;
  }).join('');
}

function getSymbol(setId, setName){
  // 1. Par ID exact
  if(SYMBOL_FALLBACK[setId]) return SYMBOL_FALLBACK[setId];
  // 2. Par nom FR
  if(setName && SYMBOL_BY_NAME[setName]) return SYMBOL_BY_NAME[setName];
  // 3. Fallback TCGdex
  return '';
}


async function loadSeries(){
  document.getElementById('series-list').innerHTML='<div class="loader">Chargement des séries…</div>';

  // 1. Utiliser la base mobile locale si disponible
  if(_mobileDB?.series?.length){
    _seriesData = _mobileDB.series;
    renderSeries();
    return;
  }

  // 2. Serveur local
  try{
    const r = await fetch(`${LOCAL}/api/series`, {signal: AbortSignal.timeout(3000)});
    const d = await r.json();
    if(!d.loading && d.series?.length){
      _seriesData = d.series;
      renderSeries();
      return;
    }
    if(d.loading){
      setTimeout(loadSeries, 2000);
      return;
    }
  }catch(e){}

  // 3. TCGdex en ligne (fallback)
  try{
    const r = await fetch(`${TCGDEX_FR}/series`);
    const list = await r.json();
    _seriesData = list.filter(s => s.sets?.length > 0).reverse();
    renderSeries();
  }catch(e){
    document.getElementById('series-list').innerHTML=`<div class="empty-state"><span class="big">⚠️</span>Séries non disponibles.<br>Synchronise la base depuis le PC.</div>`;
  }
}

function renderSeries(){
  const TCGDEX_TO_PTCG = {"me01":"me1","me02":"me2","me02.5":"me2pt5","me03":"me3","me04":"me4","sv01":"sv1","sv02":"sv2","sv03":"sv3","sv03.5":"sv3pt5","sv04":"sv4","sv04.5":"sv4pt5","sv05":"sv5","sv06":"sv6","sv06.5":"sv6pt5","sv07":"sv7","sv08":"sv8","sv08.5":"sv8pt5","sv09":"sv9","sv10":"sv10","sv10.5w":"rsv10pt5","sv10.5b":"zsv10pt5","swsh12.5":"swsh12pt5","sm7.5":"sm75","sm3.5":"sm35","sm11.5":"sm115"};

  // Index de la collection par setId pour calcul rapide
  const collBySet = {};
  col.forEach(c => {
    const sid = c.setId || c.set;
    if(sid){ if(!collBySet[sid]) collBySet[sid]=0; collBySet[sid]++; }
  });

  const series=[..._seriesData];
  document.getElementById('series-list').innerHTML=series.map((s,i)=>{
    const sets=s.sets||[];
    return`<div class="serie-block">
      <div class="serie-header" onclick="toggleSerie(${i})">
        <span class="serie-name">${s.name}</span>
        <span class="serie-arrow" id="sa-${i}">▾</span>
      </div>
      <div class="serie-sets" id="ss-${i}">
        ${sets.map(st=>{
          const ptcgId = TCGDEX_TO_PTCG[st.id] || st.id;
          const symbolUrl = getSymbol(ptcgId, st.name) || getSymbol(st.id, st.name);
          const total = st.cardCount?.official || 0;
          const owned = collBySet[ptcgId] || collBySet[st.id] || 0;
          const pct = total > 0 ? Math.round(owned/total*100) : 0;
          const pctColor = pct===100 ? '#4ade80' : pct>50 ? '#FFD700' : 'rgba(255,255,255,0.4)';
          return`<div class="set-item" onclick="openGrid('${escId(st.id)}','${escId(st.name||'')}')">
            ${symbolUrl?`<img src="${symbolUrl}" alt="" style="width:22px;height:22px;object-fit:contain;opacity:.85;flex-shrink:0" onerror="this.style.display='none'">`:'<span style="width:22px;flex-shrink:0"></span>'}
            <div style="flex:1;min-width:0">
              <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:4px">
                <span class="set-item-name" style="white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:60%">${st.name||st.id}</span>
                <span style="font-size:10px;font-weight:700;color:${pctColor};flex-shrink:0;margin-left:6px">${owned>0?owned+'/'+total+' · '+pct+'%':total+' cartes'}</span>
              </div>
              ${total>0?`<div class="prog-bar"><div class="prog-fill" style="width:${pct}%;background:${pctColor==='#4ade80'?'#4ade80':pctColor==='#FFD700'?'linear-gradient(90deg,#FFD700,#FFA500)':'rgba(255,255,255,0.15)'}"></div></div>`:''}
            </div>
          </div>`;
        }).join('')}
      </div>
    </div>`;
  }).join('');
}

function toggleSerie(i){
  const s=document.getElementById('ss-'+i),a=document.getElementById('sa-'+i);

}

async function openGrid(setId,setName){
  _gridSetId=setId;
  document.getElementById('grid-title').textContent=setName||setId;
  document.getElementById('grid-pct').textContent='';
  document.getElementById('grid-stats').style.display='none';
  document.getElementById('card-grid').innerHTML='<div class="loader">Chargement…</div>';
  document.getElementById('grid-overlay').classList.add('open');
  document.body.style.overflow='hidden';
  try{
    const r=await fetch(`${TCGDEX_FR}/sets/${setId}`);
    const d=await r.json();
    _gridCards=d.cards||[];
    renderGrid();
  }catch(e){
    document.getElementById('card-grid').innerHTML=`<div class="empty-state"><span class="big">⚠️</span>Erreur chargement</div>`;
  }
}

function renderGrid(){
  const ownedMap=new Map(col.map(c=>[c.id,c]));
  const owned=_gridCards.filter(c=>{
    const id=c.id||(_gridSetId+'-'+c.localId);
    return ownedMap.has(id);
  });
  const pct=_gridCards.length?Math.round(owned.length/_gridCards.length*100):0;
  document.getElementById('grid-pct').textContent=`${owned.length}/${_gridCards.length}`;
  document.getElementById('grid-count').textContent=`${owned.length} / ${_gridCards.length} cartes · ${pct}%`;
  const fill=document.getElementById('grid-prog-fill');
  if(fill) fill.style.width=pct+'%';
  document.getElementById('grid-stats').style.display='block';

  const isLocal = window.location.hostname === 'localhost';
  document.getElementById('card-grid').innerHTML=_gridCards.map(c=>{
    const id=c.id||(_gridSetId+'-'+c.localId);
    const oc=ownedMap.get(id);
    const tcgdexImg=c.image?c.image+'/low.webp':`https://assets.tcgdex.net/fr/${_gridSetId}/${c.localId}/low.webp`;
    const localImg=isLocal?`${LOCAL}/images/${id}.png`:null;
    const sid=escId(id);
    const cname=escId(c.name||'');
    const cimg=escId(tcgdexImg);
    return`<div class="grid-card${oc?'':' not-owned'}" onclick="${oc?`openCardModal('${sid}')`:`gridTapUnowned('${sid}','${cname}','${cimg}')`}">
      <img data-src="${localImg||tcgdexImg}" data-fallback="${tcgdexImg}" loading="lazy" onerror="if(this.src!==this.dataset.fallback){this.src=this.dataset.fallback}else{this.style.opacity='.2'}">
      <span class="grid-card-num">${c.localId||c.number||''}</span>
      ${oc?`<span class="grid-card-qty">${oc.qty}×</span>`:''}
      ${!oc?`<button class="grid-add-btn" onclick="event.stopPropagation();quickAddFromGrid('${sid}','${cname}','${cimg}')">+</button>`:''}
    </div>`;
  }).join('');

  // Intersection Observer pour lazy loading
  const observer = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
      if(entry.isIntersecting){
        const img = entry.target.querySelector('img[data-src]');
        if(img && !img.src){
          img.src = img.dataset.src;
          observer.unobserve(entry.target);
        }
      }
    });
  }, {rootMargin: '100px'});

  document.querySelectorAll('.grid-card').forEach(card => observer.observe(card));
}

function gridTapUnowned(id, name, img){
  const c=_gridCards.find(x=>(x.id===id)||((_gridSetId+'-'+x.localId)===id));
  const largImg=img.replace('/low.webp','/high.webp');
  window._addCard={
    id, name: name||(c?.name||id),
    number: c?.localId||c?.number||id.split('-').pop(),
    rarity: c?.rarity||'',
    set:{id:_gridSetId, name:document.getElementById('grid-title').textContent},
    images:{small:img, large:largImg}
  };
  document.getElementById('card-modal-content').innerHTML=`
    <div class="modal-header">
      <span class="modal-title" style="font-size:15px">${name}</span>
      <button class="modal-close" onclick="closeModal('card-modal')">✕</button>
    </div>
    <div class="modal-img-wrap"><img src="${largImg}" onerror="this.src='${img}'"></div>
    <div class="modal-section">
      <div style="font-size:13px;color:rgba(255,255,255,0.55)">${document.getElementById('grid-title').textContent}${c?.localId?' · N°'+c.localId:''}${c?.rarity?' · '+c.rarity:''}</div>
    </div>
    <div class="btn-row">
      <button class="btn btn-primary btn-full" onclick="addCard(window._addCard);closeModal('card-modal');renderGrid()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        Ajouter à ma collection
      </button>
    </div>`;
  openModal('card-modal');
}

function quickAddFromGrid(id, name, img){
  const c=_gridCards.find(x=>(x.id===id)||((_gridSetId+'-'+x.localId)===id));
  const cardObj={
    id, name: name||(c?.name||id),
    number: c?.localId||c?.number||id.split('-').pop(),
    rarity: c?.rarity||'',
    set:{id:_gridSetId, name:document.getElementById('grid-title').textContent},
    images:{
      small: c?.image ? c.image+'/low.webp' : img,
      large: c?.image ? c.image+'/high.webp' : img.replace('/low.webp','/high.webp')
    }
  };
  addCard(cardObj);
  renderGrid();
}

function closeGrid(){
  document.getElementById('grid-overlay').classList.remove('open');
  document.body.style.overflow='';
}

// ── STATS ──


// ── MODAL ──
function openModal(id){ document.getElementById(id).classList.add('open'); document.body.style.overflow='hidden'; }
function closeModal(id){
  document.getElementById(id).classList.remove('open');
  if(!document.querySelector('.modal-bg.open')&&!document.getElementById('grid-overlay').classList.contains('open')) document.body.style.overflow='';
}

// ── DRIVE ──
function openDriveModal(){ updateDriveUI(); openModal('drive-modal'); }

function updateDriveUI(){
  const dot=document.getElementById('drive-dot');
  const label=document.getElementById('drive-label');
  const nc=document.getElementById('drive-nc');
  const conn=document.getElementById('drive-conn');
  if(_driveToken){
    dot.className='drive-dot ok';
    label.textContent='✓';
    nc.style.display='none'; conn.style.display='block';
    document.getElementById('drive-email').textContent='✓ '+(localStorage.getItem('drive_hint')||'Connecté');
  } else {
    dot.className='drive-dot';
    label.textContent='Drive';
    nc.style.display='block'; conn.style.display='none';
  }
}

function driveSignIn(){
  const hint=localStorage.getItem('drive_hint');
  const client=google.accounts.oauth2.initTokenClient({
    client_id:DRIVE_CLIENT_ID, scope:DRIVE_SCOPE,
    login_hint:hint||undefined,
    callback:async(resp)=>{
      if(resp.error){ toast('Erreur : '+resp.error); return; }
      _driveToken=resp.access_token;
      localStorage.setItem('drive_token',_driveToken);
      try{
        const info=await fetch('https://www.googleapis.com/oauth2/v3/userinfo',{headers:{'Authorization':'Bearer '+_driveToken}}).then(r=>r.json());
        if(info.email) localStorage.setItem('drive_hint',info.email);
      }catch(e){}
      updateDriveUI();
      toast('✅ Connecté à Google Drive');
      await driveLoad(true);
    }
  });
  client.requestAccessToken();
}

function driveSignOut(){
  if(_driveToken) try{google.accounts.oauth2.revoke(_driveToken);}catch(e){}
  _driveToken=null; _driveFileId=null;
  localStorage.removeItem('drive_token');
  updateDriveUI(); closeModal('drive-modal'); toast('Déconnecté de Drive');
}

async function driveFindFile(){
  if(!_driveToken) return null;
  const r=await fetch(`https://www.googleapis.com/drive/v3/files?q=name='${DRIVE_FILE_NAME}'+and+trashed=false&fields=files(id,name)`,{headers:{'Authorization':'Bearer '+_driveToken}});
  const d=await r.json(); return d.files?.[0]?.id||null;
}

async function driveSave(silent=false){
  if(!_driveToken){ if(!silent) toast('Connecte-toi à Drive d\'abord'); return; }
  try{
    const dot=document.getElementById('drive-dot');
    dot.className='drive-dot busy';
    const data=JSON.stringify({collection:col,savedAt:new Date().toISOString()});
    const fileId=_driveFileId||await driveFindFile();
    let r;
    if(fileId){
      r=await fetch(`https://www.googleapis.com/upload/drive/v3/files/${fileId}?uploadType=media`,{method:'PATCH',headers:{'Authorization':'Bearer '+_driveToken,'Content-Type':'application/json'},body:data});
    } else {
      const meta=JSON.stringify({name:DRIVE_FILE_NAME,mimeType:'application/json'});
      const form=new FormData();
      form.append('metadata',new Blob([meta],{type:'application/json'}));
      form.append('file',new Blob([data],{type:'application/json'}));
      r=await fetch('https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart',{method:'POST',headers:{'Authorization':'Bearer '+_driveToken},body:form});
    }
    const res=await r.json(); _driveFileId=res.id;
    dot.className='drive-dot ok';
    if(!silent){ toast('✅ Collection sauvegardée sur Drive !'); closeModal('drive-modal'); }
  }catch(e){
    document.getElementById('drive-dot').className='drive-dot';
    if(!silent) toast('Erreur sauvegarde Drive');
  }
}

async function driveLoad(silent=false){
  if(!_driveToken){ if(!silent) toast('Connecte-toi à Drive d\'abord'); return; }
  try{
    if(!silent) toast('⏳ Récupération…');
    const fileId=_driveFileId||await driveFindFile();
    if(!fileId){ if(!silent) toast('Aucune sauvegarde trouvée'); return; }
    _driveFileId=fileId;
    const r=await fetch(`https://www.googleapis.com/drive/v3/files/${fileId}?alt=media`,{headers:{'Authorization':'Bearer '+_driveToken}});
    const d=await r.json();
    if(d.collection&&d.collection.length>0){ col=d.collection; save(); renderCollOverlay(); toast(`✅ ${col.length} cartes chargées depuis Drive !`); }
    else if(!silent) toast('Aucune collection sur Drive');
    if(!silent) closeModal('drive-modal');
  }catch(e){ if(!silent) toast('Erreur récupération Drive'); }
}

// ── TOAST ──
let _tt;
function toast(msg,dur=2500){ const el=document.getElementById('toast'); el.textContent=msg; el.classList.add('show'); clearTimeout(_tt); _tt=setTimeout(()=>el.classList.remove('show'),dur); }

// ── INIT ──
async function init(){
  load(); renderHome();
  const t=localStorage.getItem('drive_token');
  if(t){
    _driveToken=t; updateDriveUI();
    try{
      const fid=await driveFindFile();
      if(fid){ _driveFileId=fid; document.getElementById('drive-dot').className='drive-dot ok'; }
      else { _driveToken=null; localStorage.removeItem('drive_token'); updateDriveUI(); }
    }catch(e){ _driveToken=null; localStorage.removeItem('drive_token'); updateDriveUI(); }
  }
  // Charger la base mobile en arrière-plan
  await loadMobileDB();
}
init();

// PWA Service Worker
if('serviceWorker' in navigator){
  navigator.serviceWorker.register('./sw.js').catch(e => console.log('SW:', e));
}

</script>
